{% extends 'base/base.html' %}
{% block title %}Inscription - Recettes Maison{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">S'inscrire</h3>

        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-success w-100">S'inscrire</button>
        </form>

        <p class="text-center mt-3">
          Déjà inscrit? <a href="{% url 'users:login' %}">Se connecter</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
