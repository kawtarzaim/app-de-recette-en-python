{% extends 'base/base.html' %}
{% block title %}Photos - Recettes Maison{% endblock %}

{% block content %}
<h3>Galerie</h3>
<div class="row row-cols-1 row-cols-md-3 g-3">
  {% for photo in photos %}
    <div class="col">
      <div class="card">
        {% if photo.image %}
          <img src="{{ photo.image.url }}" class="card-img-top" alt="{{ photo.title }}">
        {% endif %}
        <div class="card-body">
          <h6 class="card-title">{{ photo.title }}</h6>
        </div>
      </div>
    </div>
  {% empty %}
    <p>Aucune photo disponible.</p>
  {% endfor %}
</div>
{% endblock %}
