{% extends 'base/base.html' %}
{% block title %}Créer une catégorie - Recettes Maison{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">Ajouter une catégorie</h3>

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">{{ form.name.label }}</label>
            {{ form.name }}
            {% if form.name.errors %}
              <div class="invalid-feedback d-block">{{ form.name.errors }}</div>
            {% endif %}
          </div>
          <button type="submit" class="btn btn-success w-100">Créer</button>
        </form>

        <p class="text-center mt-3">
          <a href="{% url 'category:list' %}">Retour aux catégories</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
