{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded p-2">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="{% url 'base:home' %}">
      <i class="bi bi-egg-fried text-success fs-3 me-2"></i>
      <span class="fw-semibold">Recettes Maison</span>
    </a>

    <form class="d-flex mx-auto w-50" method="get" action="{% url 'recettes:home' %}">
      {% csrf_token %}
      <div class="input-group">
        <input name="q" class="form-control rounded-pill" type="search" placeholder="Rechercher une recette, ingrédient..." aria-label="Search">
        <button class="btn btn-success rounded-pill ms-2 text-white" type="submit"><i class="bi bi-search"></i></button>
      </div>
    </form>

    <div class="d-flex align-items-center gap-2">
      <a class="btn btn-link text-dark" href="{% url 'base:home' %}" title="Accueil">
        <i class="bi bi-house-door fs-5"></i>
      </a>
      <a class="btn btn-link text-dark" href="{% url 'category:list' %}" title="Catégories">
        <i class="bi bi-bookmark fs-5"></i>
      </a>
      {% if user.is_authenticated %}
        <a class="btn btn-link text-dark" href="{% url 'recettes:my_recipes' %}" title="Mes recettes">
          <i class="bi bi-file-earmark-text fs-5"></i>
        </a>
      {% endif %}

      {% if user.is_authenticated %}
        <a class="btn btn-link text-dark" href="{% url 'users:profile' %}" title="Profil">
          <i class="bi bi-person-circle fs-5"></i>
        </a>

        <a class="btn btn-success text-white rounded-pill d-flex align-items-center" href="{% url 'recettes:create' %}" title="Ajouter une recette">
          <i class="bi bi-plus-lg"></i>
        </a>

        <a class="btn btn-outline-danger" href="{% url 'users:logout' %}" title="Déconnexion">
          <i class="bi bi-box-arrow-right"></i>
        </a>
      {% else %}
        <a class="btn btn-outline-primary" href="{% url 'users:login' %}" title="Connexion">
          <i class="bi bi-box-arrow-in-right"></i>
        </a>

        <a class="btn btn-success text-white rounded-pill" href="{% url 'users:signup' %}" title="S'inscrire">
          <i class="bi bi-person-plus"></i>
        </a>
      {% endif %}
    </div>
  </div>
</nav>
